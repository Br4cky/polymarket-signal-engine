name: Signal Engine

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:          # Manual trigger from Actions tab

permissions:
  contents: write             # Needed to push data/ commits

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run signal engine
        run: python engine.py --once --execute

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signal_data.json data/portfolio_state.json data/signal_log.jsonl
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "engine: update signals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Pull-rebase to handle race condition with other pushes, retry once
            git pull --rebase origin main || true
            git push || (git pull --rebase origin main && git push)
          fi

      # Deploy dashboard to Netlify via API (no build minutes consumed)
      # Only uploads the files the dashboard actually needs
      - name: Deploy to Netlify (API)
        if: ${{ secrets.NETLIFY_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN --message="engine update $(date -u +%H:%M)"
